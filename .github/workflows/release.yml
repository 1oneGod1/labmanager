name: Release LabKom Apps

on:
  push:
    branches:
      - main
    paths:
      - 'admin/**'
      - 'client/**'
      - 'server/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versi opsional, contoh: 1.2.0 (kosong = dibuat otomatis)'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
            admin/package-lock.json

      - name: Determine release version
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch' -and '${{ inputs.version }}') {
            $version = '${{ inputs.version }}'
          } else {
            $package = Get-Content 'client/package.json' -Raw | ConvertFrom-Json
            $parts = $package.version.Split('.')
            $buildNumber = [DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
            $version = "$($parts[0]).$($parts[1]).$buildNumber"
          }
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?$') {
            throw "Versi tidak valid: $version"
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure release tag exists
        shell: pwsh
        run: |
          $tag = "v$env:RELEASE_VERSION"
          $existing = git ls-remote --tags origin "refs/tags/$tag"
          if (-not $existing) {
            git tag $tag $env:GITHUB_SHA
            git push origin $tag
          }

      - name: Install server dependencies
        working-directory: server
        run: npm ci --omit=dev

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Set client version
        working-directory: client
        run: npm version "$env:RELEASE_VERSION" --no-git-tag-version

      - name: Build Student app
        working-directory: client
        run: npm run electron:build -- --publish never

      - name: Install admin dependencies
        working-directory: admin
        run: npm ci

      - name: Set admin version
        working-directory: admin
        run: npm version "$env:RELEASE_VERSION" --no-git-tag-version

      - name: Build Admin app
        working-directory: admin
        run: npm run electron:build -- --publish never

      - name: Verify packaged Admin backend
        working-directory: admin
        run: npm run verify:packaged-server

      - name: Publish complete GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$env:RELEASE_VERSION"
          gh release view $tag --repo '${{ github.repository }}' *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --repo '${{ github.repository }}' `
              --verify-tag `
              --draft `
              --title $env:RELEASE_VERSION `
              --notes "Rilis otomatis LabKom Admin dan Siswa."
          }

          $assets = @(
            Get-ChildItem 'client/dist-electron' -File | Where-Object { $_.Extension -eq '.exe' -or $_.Name -like '*.exe.blockmap' -or $_.Name -eq 'client.yml' }
            Get-ChildItem 'admin/dist-electron' -File | Where-Object { $_.Extension -eq '.exe' -or $_.Name -like '*.exe.blockmap' -or $_.Name -eq 'admin.yml' }
          )
          if ($assets.Count -ne 6) {
            throw "Aset rilis tidak lengkap: ditemukan $($assets.Count), seharusnya 6."
          }

          gh release upload $tag @($assets.FullName) --repo '${{ github.repository }}' --clobber
          gh release edit $tag --repo '${{ github.repository }}' --draft=false --latest

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: labkom-installers-${{ env.RELEASE_VERSION }}
          path: |
            client/dist-electron/*.exe
            client/dist-electron/*.yml
            client/dist-electron/*.blockmap
            admin/dist-electron/*.exe
            admin/dist-electron/*.yml
            admin/dist-electron/*.blockmap
